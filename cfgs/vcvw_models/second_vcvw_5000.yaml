CLASS_NAMES: &id001
- Forklift
- DumpTruck
- Bulldozer
- ConcreteMixer
- Loader
- Excavator
- RoadRoller
- Crane
- Grader
DATA_CONFIG:
  _BASE_CONFIG_: tools/cfgs/dataset_configs/vcvw_extend5000_like1000_9cls.yaml
  CLASS_NAMES: *id001
  POINT_CLOUD_RANGE:
  - 0.0
  - -70.4
  - -10.0
  - 70.4
  - 70.4
  - 10.0
  DATA_PROCESSOR:
  - NAME: mask_points_and_boxes_outside_range
    REMOVE_OUTSIDE_BOXES: true
  - NAME: shuffle_points
    SHUFFLE_ENABLED:
      train: true
      test: false
  - NAME: transform_points_to_voxels
    VOXEL_SIZE:
    - 0.2
    - 0.2
    - 0.2
    MAX_POINTS_PER_VOXEL: 20
    MAX_NUMBER_OF_VOXELS:
      train: 20000
      test: 40000
MODEL:
