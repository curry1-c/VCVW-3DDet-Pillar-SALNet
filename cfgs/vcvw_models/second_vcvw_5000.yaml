    LAYER_NUMS:
    - 5
    - 5
    LAYER_STRIDES:
    - 1
    - 2
    NUM_FILTERS:
    - 128
    - 256
    UPSAMPLE_STRIDES:
    - 1
    - 2
    NUM_UPSAMPLE_FILTERS:
    - 256
