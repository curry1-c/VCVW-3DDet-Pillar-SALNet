  VFE:
    NAME: MeanVFE
  BACKBONE_3D:
    NAME: VoxelBackBone8x
  MAP_TO_BEV:
    NAME: HeightCompression
    NUM_BEV_FEATURES: 640
  BACKBONE_2D:
