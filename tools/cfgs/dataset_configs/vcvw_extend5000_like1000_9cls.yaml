DATASET: CustomDataset
DATA_PATH: data/vcvw_extend5000_like1000_9cls
POINT_CLOUD_RANGE:
- 0.0
- -70.4
- -10.0
- 70.4
- 70.4
- 10.0
DATA_SPLIT:
  train: train
  test: val
INFO_PATH:
  train:
  - infos_train.pkl
  test:
  - infos_val.pkl
GET_ITEM_LIST:
- points
FOV_POINTS_ONLY: false
CLASS_NAMES:
- Forklift
- DumpTruck
- Bulldozer
- ConcreteMixer
- Loader
- Excavator
- RoadRoller
- Crane
- Grader
MAP_CLASS_TO_KITTI:
  Forklift: Forklift
  DumpTruck: DumpTruck
  Bulldozer: Bulldozer
  ConcreteMixer: ConcreteMixer
  Loader: Loader
  Excavator: Excavator
  RoadRoller: RoadRoller
  Crane: Crane
  Grader: Grader

DATA_AUGMENTOR:
  DISABLE_AUG_LIST:
  - gt_sampling
  - random_world_flip
  - random_world_rotation
  - random_world_scaling
  AUG_CONFIG_LIST:
  - NAME: random_world_flip
    ALONG_AXIS_LIST:
    - x
  - NAME: random_world_rotation
    WORLD_ROT_ANGLE:
    - -0.78539816
    - 0.78539816
  - NAME: random_world_scaling
    WORLD_SCALE_RANGE:
    - 0.95
    - 1.05
POINT_FEATURE_ENCODING:
  encoding_type: absolute_coordinates_encoding
  used_feature_list:
  - x
  - y
  - z
  - intensity
  src_feature_list:
  - x
  - y
  - z
  - intensity
DATA_PROCESSOR:
- NAME: mask_points_and_boxes_outside_range
  REMOVE_OUTSIDE_BOXES: true
- NAME: shuffle_points
  SHUFFLE_ENABLED:
    train: true
    test: false
- NAME: transform_points_to_voxels
  VOXEL_SIZE:
  - 0.2
  - 0.2
  - 20.0
  MAX_POINTS_PER_VOXEL: 32
  MAX_NUMBER_OF_VOXELS:
    train: 12000
    test: 16000
DATA_LOADER:
  NUM_WORKERS: 0
  PIN_MEMORY: false
